  </g>
  <text x="88" y="60" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="600" letter-spacing="-1">
    <tspan fill="#E6EDF0">Lake</tspan><tspan fill="#2EE6D6">Sense</tspan>
  </text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" width="420" height="96" role="img" aria-label="LakeSense">
  <defs>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EE6D6"/>
      <stop offset="1" stop-color="#20968C"/>
    </linearGradient>
  </defs>
  <!-- sonar glyph: concentric soundings over a waterline -->

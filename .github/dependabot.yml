version: 2
# Automated dependency-update PRs; CI validates them, the founder merges green ones.
updates:
  - package-ecosystem: gomod
    directory: /engine
    schedule: { interval: weekly }
  - package-ecosystem: gomod
    directory: /backend
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

name: release

# Tagging IS the release process. On a version tag, build and push the three
# images to GitHub Container Registry and cut a GitHub Release with binaries.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: engine
            dockerfile: engine/Dockerfile
          - name: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}/lakesense-${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/lakesense-${{ matrix.name }}:latest

  binaries:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: build static binaries
        run: |
          mkdir -p dist
          (cd engine && CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/lakesense/lakesense/engine/internal/buildinfo.Version=${{ github.ref_name }}" -o ../dist/lsengine ./cmd/lsengine)
          (cd backend && CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/lakesense/lakesense/backend/internal/buildinfo.Version=${{ github.ref_name }}" -o ../dist/lakesense ./cmd/lakesense)
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

# Serves the built dashboard and reverse-proxies the API to the control plane,
# so the browser talks to a single origin.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the static bundle.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API and health proxy to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
    location = /healthz {
        proxy_pass http://backend:8080/healthz;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
